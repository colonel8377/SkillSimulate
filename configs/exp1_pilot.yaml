# Pilot — Exp 1 lean grid for effect-size estimation and condition coverage
# Single dataset (wikipedia), single model, all 13 conditions,
# reduced repeats/rounds/population. NOT paper-grade — used to (a) validate
# that every condition executes against real LLM output, (b) estimate
# Cohen's d for power analysis (outline §5.1), (c) sanity-check cost
# before scaling to exp1_full.yaml.
name: exp1_pilot
datasets: [wikipedia]
models: [deepseek-v4-flash]
compile_model: deepseek-v4-pro
conditions:
  - vanilla
  - descriptive
  - segmentation
  - pop_aligned
  - colleague_skill
  - clustering_only
  - cadp_full
  - cadp_shuffled
  - cadp_minus_edna
  - cadp_minus_mm
  - cadp_minus_ap
  - cadp_constraint_only
  - pop_aligned_cadp
num_repeats: 2
num_rounds: 15
population_size: 10
alpha: 1.0
num_clusters: 4
cluster_method: kmeans
top_n_threads: 20
max_threads: 500
checkpoint_every: 5
max_concurrency: 32
seed: 42
# Issue 1: memory strategy. "sliding" = token-aware top-K retrieval (default).
# Leave explicit so the operator sees the knob exists; the R4 collapse
# stress test (configs/collapse_stress.yaml) sets this to "rolling_summary".
memory_strategy: sliding
