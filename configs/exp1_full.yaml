# Full Experiment 1 — method validation grid
name: exp1_full
datasets: [wikipedia, reddit, github]
models: [gpt-4o, claude-3.5-sonnet, llama-3-70b, qwen-2.5-72b]
conditions:
  - vanilla
  - descriptive
  - segmentation
  - pop_aligned
  - cadp_full
  - cadp_shuffled
  - cadp_minus_edna
  - cadp_minus_mm
  - cadp_minus_ap
  - cadp_constraint_only
num_repeats: 5
num_rounds: 30
population_size: 30
alpha: 1.0
num_clusters: 4
cluster_method: kmeans
top_n_threads: 20
checkpoint_every: 5
max_concurrency: 4
seed: 42
