# Full Experiment 1 — method validation grid
name: exp1_full
datasets: [wikipedia, reddit, github]
models: [gpt-4o, claude-3.5-sonnet, llama-3-70b, qwen-2.5-72b]
conditions:
  - vanilla
  - descriptive
  - segmentation
  - pop_aligned
  - colleague_skill
  - clustering_only
  - cadp_full
  - cadp_shuffled
  - cadp_minus_edna
  - cadp_minus_mm
  - cadp_minus_ap
  - cadp_constraint_only
  - pop_aligned_cadp
num_repeats: 5
num_rounds: 30
population_size: 30
# α (outline §4.4.3). Scalar = uniform enforcement across all three tiers
# (the correct setting for CADP Full vs baselines). Per-tier overrides —
# exercised by the §5.6.5 alpha-sensitivity runner — may be set here; any
# left as null fall back to `alpha`:
#   alpha_tier1: 1.0   # Expression DNA  (Tier 1)
#   alpha_tier2: 1.0   # Mind Models     (Tier 2)
#   alpha_tier3: 1.0   # Anti-patterns   (Tier 3)
alpha: 1.0
num_clusters: 4
cluster_method: kmeans
top_n_threads: 20
checkpoint_every: 5
max_concurrency: 4
seed: 42
