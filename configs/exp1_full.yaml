# Full Experiment 1 — method validation grid
name: exp1_full
datasets: [wikipedia, reddit, github]
models: [gpt-4o, claude-3.5-sonnet, llama-3-70b, qwen-2.5-72b]
conditions:
  - vanilla
  - descriptive
  - segmentation
  - pop_aligned
  - colleague_skill
  - clustering_only
  - cadp_full
  - cadp_shuffled
  - cadp_minus_edna
  - cadp_minus_mm
  - cadp_minus_ap
  - cadp_constraint_only
  - pop_aligned_cadp
num_repeats: 5
num_rounds: 30
population_size: 30
# α (outline §4.4.3). Per-dimension α = (α_expr, α_mind, α_anti) is a
# named methodological contribution of the paper, so the headline
# 13-condition run must drive constraint enforcement through the per-tier
# path (not the scalar shortcut). The values below are the uniform-headline
# baseline; the §5.6.5 sensitivity runner sweeps the 75-cell grid and
# selects the optimum tuple per dataset, which can be substituted here for
# per-dataset reporting (e.g. (1.0, 0.5, 1.0) for Reddit per the outline
# example). `alpha` remains as the fallback when any tier is left null.
alpha: 1.0
alpha_tier1: 1.0   # Expression DNA  (Tier 1 post-gen embedding filter)
alpha_tier2: 1.0   # Mind Models     (Tier 2 retrieval injection)
alpha_tier3: 1.0   # Anti-patterns   (Tier 3 two-stage enforcement)
num_clusters: 4
cluster_method: kmeans
top_n_threads: 20
checkpoint_every: 5
max_concurrency: 4
seed: 42
# Issue 1: token-aware sliding window (default). 30 rounds is short
# enough that long-horizon signal loss is acceptable; switching to
# "rolling_summary" would add ~140K extra LLM calls across the grid.
memory_strategy: sliding
