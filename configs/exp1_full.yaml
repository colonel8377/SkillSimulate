# Full Experiment 1 — method validation grid
name: exp1_full
datasets: [wikipedia, reddit, github]
models: [deepseek-v4-flash]
compile_model: deepseek-v4-pro
conditions:
  - vanilla
  - descriptive
  - segmentation
  - pop_aligned
  - colleague_skill
  - clustering_only
  - cadp_full
  - cadp_shuffled
  - cadp_minus_edna
  - cadp_minus_mm
  - cadp_minus_ap
  - cadp_constraint_only
  - pop_aligned_cadp
num_repeats: 5
num_rounds: 50
population_size: 30
# α (outline §4.4.3). Per-dimension α = (α_expr, α_mind, α_anti) is a
# named methodological contribution of the paper, so the headline
# 13-condition run must drive constraint enforcement through the per-tier
# path (not the scalar shortcut). The values below are the uniform-headline
# baseline; the §5.6.5 sensitivity runner sweeps the 75-cell grid and
# selects the optimum tuple per dataset, which can be substituted here for
# per-dataset reporting (e.g. (1.0, 0.5, 1.0) for Reddit per the outline
# example). `alpha` remains as the fallback when any tier is left null.
alpha: 1.0
alpha_tier1: 1.0   # Expression DNA  (Tier 1 post-gen embedding filter)
alpha_tier2: 1.0   # Mind Models     (Tier 2 retrieval injection)
alpha_tier3: 1.0   # Anti-patterns   (Tier 3 two-stage enforcement)
num_clusters: 4
cluster_method: kmeans
top_n_threads: 20
checkpoint_every: 5
max_threads: 2000
max_concurrency: 32
seed: 42
# Long-horizon context budget (B3). The defaults (max_context_items=5,
# max_thread_messages=5) throttle every agent's view of the conversation
# and are tiny vs deepseek-v4-flash's ~984K input budget. Raising both is
# applied to ALL conditions → neutral for the CADP-vs-baseline ranking
# (fair), but improves long-horizon signal retention and metric stability.
max_context_items: 12
max_thread_messages: 10
# Issue 1: token-aware sliding window (default). 50 rounds provides
# enough headroom for persona collapse to fully develop in baselines
# (outline §5.6.7). Switching to "rolling_summary" would add ~230K
# extra LLM calls across the grid.
memory_strategy: sliding
