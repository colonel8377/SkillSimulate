# Experiment 1 v2 — single-model methodological feasibility gate.
# Scope: DeepSeek Flash × Wikipedia only. This is an exploratory GO/STOP
# study, not confirmatory evidence of cross-model or cross-community validity.
name: exp1_v2
datasets: [wikipedia]
models: [deepseek-v4-flash]
compile_model: deepseek-v4-flash

# C3/C4 are the causal comparison: identical Nuwa skill content, with versus
# without dynamic retrieval and filter/retry. C1/C2 contextualize the result.
conditions:
  - descriptive
  - rich_narrative
  - cadp_advisory_nuwa
  - cadp_full_nuwa
num_repeats: 3
num_rounds: 8
population_size: 18
population_allocation: balanced  # exactly 3 agents per locked skill

# Full CADP enforcement. Both post-generation paths use the documented
# three-attempt retry budget.
alpha: 1.0
alpha_tier1: 1.0
alpha_tier2: 1.0
max_reformulation_retries: 3
tier1_max_retries: 3

# Locked clustering is an engineering partition for this feasibility study;
# its failed stability threshold is disclosed and not treated as a finding.
num_clusters: 8
cluster_method: kmeans
clustering_pickle_path: outputs/stream_cache/clustering_k8_final_quantile.pkl
cluster_merge_map_path: outputs/skill_corpus_k8_quantile/wikiconv/cluster_map.json
top_n_threads: 20

checkpoint_every: 2
max_threads: 2000
max_sim_threads: 8
max_concurrency: 8
seed: 42
seed_min_toxicity: 0.6
max_context_items: 12
max_thread_messages: 10
memory_strategy: sliding
reflection_interval: 10  # intentionally inactive in the 8-round feasibility gate

# Three non-redundant lower-is-better families. GO means "worth a larger
# confirmatory study", not a publication-level significance claim.
viability_enabled: true
viability_treatment: cadp_full_nuwa
viability_control: cadp_advisory_nuwa
viability_primary_metrics:
  - action_fidelity_distance
  - interaction_structure_distance
  - linguistic_fidelity_distance
viability_min_pairs: 3
viability_min_metric_wins: 2
viability_min_repeat_win_fraction: 0.6666666667
viability_min_relative_improvement: 0.05
viability_max_family_regression: 0.10
viability_min_message_ratio: 0.95
viability_max_safe_template_rate: 0.10
viability_min_action_text_consistency: 0.90
