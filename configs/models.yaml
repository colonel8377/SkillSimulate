# Model endpoint definitions — all OpenAI-compatible
# Override base_url and api_key per model as needed
#
# Reproducibility provenance (audit P5 / outline §5.1(d)):
#   snapshot_date — for hosted APIs, the dated snapshot the vendor pins
#                   behaviour to (e.g. "2024-08-06" for gpt-4o-2024-08-06).
#                   Use the date you actually called against; leave empty
#                   only if the vendor does not expose dated snapshots.
#   commit_hash   — for OSS/self-hosted models, the model-weight git
#                   commit or HuggingFace revision hash.
# Either field may be empty; downstream MetricsReport rows will then
# carry an empty string instead of fabricated provenance.
#
# Token budget (Issue 1) — configurable per model:
#   max_total_tokens    — hard cap on input + output + thinking combined.
#                         Set to the model's documented context window.
#                         0 = no cap enforced (legacy behaviour, guard
#                         skipped — use only for endpoints whose limit
#                         you don't know).
#   max_thinking_tokens — reserved reasoning budget. 0 for non-reasoning
#                         models (gpt-4o, claude, llama, qwen, glm).
#                         >0 for reasoning models (DeepSeek-V4 etc.).
#   max_tokens          — output-only cap (passed to the API as the
#                         OpenAI ``max_tokens`` kwarg). Historical field,
#                         kept for back-compat.
#   Derived: max_input_tokens = max_total_tokens - max_thinking_tokens - max_tokens
#   The pre-flight guard in LLMClient refuses prompts that would exceed
#   max_input_tokens. Verify the context-window values against your
#   actual endpoint / proxy before paper-scale runs.
models:
  - name: gpt-4o
    model: gpt-4o
    base_url: ""         # uses CADP_OPENAI_BASE_URL env
    api_key: ""          # uses CADP_OPENAI_API_KEY env
    temperature: 0.7
    max_tokens: 2048
    max_total_tokens: 128000      # gpt-4o context window
    max_thinking_tokens: 0        # non-reasoning model
    cost_per_1k_input: 2.50
    cost_per_1k_output: 10.00
    snapshot_date: ""    # e.g. "2024-08-06" — fill before submission
    commit_hash: ""

  - name: claude-3.5-sonnet
    model: claude-3-5-sonnet-20241022
    base_url: ""
    api_key: ""
    temperature: 0.7
    max_tokens: 2048
    max_total_tokens: 200000      # claude-3.5-sonnet context window
    max_thinking_tokens: 0        # non-reasoning model
    cost_per_1k_input: 3.00
    cost_per_1k_output: 15.00
    snapshot_date: "2024-10-22"   # encoded in model id
    commit_hash: ""

  - name: llama-3-70b
    model: meta-llama/Llama-3-70B
    base_url: ""
    api_key: ""
    temperature: 0.7
    max_tokens: 2048
    # Llama-3-70B native context is 8K; most hosted providers (Together,
    # Groq, etc.) extend to 128K via RoPE scaling. Adjust to match your
    # actual endpoint.
    max_total_tokens: 128000
    max_thinking_tokens: 0        # non-reasoning model
    cost_per_1k_input: 0.60
    cost_per_1k_output: 0.90
    snapshot_date: ""
    commit_hash: ""             # HF revision — fill before submission

  - name: qwen-2.5-72b
    model: Qwen/Qwen2.5-72B-Instruct
    base_url: ""
    api_key: ""
    temperature: 0.7
    max_tokens: 2048
    max_total_tokens: 131072      # Qwen2.5 supports up to 128K context
    max_thinking_tokens: 0        # non-reasoning model
    cost_per_1k_input: 0.50
    cost_per_1k_output: 1.00
    snapshot_date: ""
    commit_hash: ""             # HF revision — fill before submission

  # Zhipu GLM — used by exp1_pilot.yaml against the CADP_OPENAI_BASE_URL
  # coding/paas/v4 endpoint. Cost rates below are placeholder estimates;
  # replace with actual Zhipu pricing before computing paper cost tables.
  - name: glm-4.7
    model: glm-4.7
    base_url: ""
    api_key: ""
    temperature: 0.7
    max_tokens: 2048
    max_total_tokens: 131072      # Zhipu GLM-4.x supports 128K context
    max_thinking_tokens: 0        # non-reasoning model
    cost_per_1k_input: 0.50
    cost_per_1k_output: 1.50
    snapshot_date: ""
    commit_hash: ""

  # DeepSeek — OpenAI-compatible endpoint at https://api.deepseek.com
  # deepseek-v4-flash: fast / cheap, preferred for simulation runs.
  # deepseek-v4-pro: higher quality, reserved for skill compilation.
  #
  # Multi-endpoint support: endpoints are loaded from environment
  # variables, NOT from this file.  Set the env var:
  #
  #   CADP_ENDPOINTS_DEEPSEEK_V4_FLASH='[
  #     {"base_url": "https://api.deepseek.com", "api_key": "sk-xxx", "model": "deepseek-chat"},
  #     {"base_url": "https://proxy.example.com/v1", "api_key": "sk-yyy"}
  #   ]'
  #
  #   CADP_ENDPOINTS_DEEPSEEK_V4_PRO='[...]'
  #
  # ``model`` is the per-endpoint model-name override (empty = use parent
  # ``model`` field below).  Endpoints are round-robin rotated; after 10
  # consecutive failures an endpoint is marked dead.  All dead → halt.
  # When the env var is unset, the legacy single-client path is used
  # (parent ``base_url`` / ``api_key`` + global CADP_OPENAI_* env vars).
  #
  # Token budget: DeepSeek-V4 context window is 1M tokens. We split:
  #   1M total − 32K thinking − 8K output ≈ 984K input budget.
  # Adjust max_thinking_tokens to trade reasoning depth for prompt size.
  - name: deepseek-v4-flash
    model: DeepSeek-V4-Flash
    base_url: ""
    api_key: ""
    api_type: auto
    supports_json_mode: false
    temperature: 0.7
    max_tokens: 8192              # output cap (also exposed as max_output_tokens)
    max_total_tokens: 1048576    # 1M context window
    max_thinking_tokens: 32768   # reserved reasoning budget
    cost_per_1k_input: 0.10
    cost_per_1k_output: 0.40
    snapshot_date: "2025-06-26"   # DeepSeek-V4-Flash public release date
    commit_hash: "DeepSeek-V4-Flash"  # proprietary API — model id as provenance

  - name: deepseek-v4-pro
    model: DeepSeek-V4-Pro
    base_url: ""
    api_key: ""
    api_type: auto
    supports_json_mode: false
    temperature: 0.7
    max_tokens: 8192              # output cap
    max_total_tokens: 1048576    # 1M context window
    max_thinking_tokens: 32768
    cost_per_1k_input: 0.55
    cost_per_1k_output: 2.19
    snapshot_date: "2025-06-26"   # DeepSeek-V4-Pro public release date
    commit_hash: "DeepSeek-V4-Pro"  # proprietary API — model id as provenance
