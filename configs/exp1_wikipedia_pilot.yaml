# Smallest viable pilot for validating exp1 fixes — Wikipedia only
# Goal: verify metric fixes + action-selection fix + thread cap before full grid
name: exp1_wikipedia_pilot
datasets: [wikipedia]
models: [deepseek-v4-flash]
compile_model: deepseek-v4-pro
conditions:
  - vanilla
  - cadp_full
  - cadp_minus_edna
  - cadp_constraint_only
  - pop_aligned_cadp
num_repeats: 1
num_rounds: 15
population_size: 10
alpha: 1.0
alpha_tier1: 1.0
alpha_tier2: 1.0
alpha_tier3: 1.0
num_clusters: 4
cluster_method: kmeans
top_n_threads: 20
checkpoint_every: 5
max_threads: 2000
max_sim_threads: 10
max_concurrency: 16
seed: 42
max_context_items: 12
max_thread_messages: 10
memory_strategy: sliding
# One reflection near the end; set > num_rounds to disable entirely.
reflection_interval: 15
